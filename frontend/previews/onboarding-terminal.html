<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#070808">
    <title>Pirepirapp - onboarding cuestionario A</title>
    <link rel="stylesheet" href="../styles/lcd-theme.css?v=3.34">
    <link rel="stylesheet" href="../styles/main.css?v=3.34">
    <link rel="stylesheet" href="../styles/responsive.css?v=3.34">
    <link rel="stylesheet" href="./onboarding.css?v=20260629-f">
  </head>
  <body>
    <div class="device-shell onboarding-preview-shell">
      <header class="status-bar" aria-label="Pirepirapp">
        <div class="brand-mark" aria-label="Pirepirapp">
          <strong>PIREPIRAPP</strong>
          <span class="brand-version">PROTO A3</span>
        </div>
        <div class="status-terminal" aria-live="polite" aria-label="Estado del prototipo">
          <span>configuracion inicial</span>
        </div>
      </header>

      <main class="lcd-screen onboarding-preview-screen" id="onboarding-root" data-variant="terminal" tabindex="-1"></main>

      <section class="key-zone onboarding-preview-keys" aria-label="Controles del tour">
        <button class="action-key" id="onboarding-next" type="button">
          <span class="action-key-label">COMENZAR</span>
        </button>

        <nav class="bottom-nav" aria-label="Acciones del prototipo">
          <button class="nav-key" data-tour-action="prev" type="button">
            <span>ATRAS</span>
          </button>
          <button class="nav-key" data-tour-action="skip" type="button">
            <span>SKIP</span>
          </button>
          <button class="nav-key" data-tour-action="restart" type="button">
            <span>REINICIAR</span>
          </button>
          <button class="nav-key" data-tour-action="finish" type="button">
            <span>ENTRAR</span>
          </button>
        </nav>
      </section>
    </div>

    <script src="./onboarding.js?v=20260629-f"></script>
  </body>
</html>
