<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1e2a1e">
    <meta name="description" content="Finanzas personales con estetica LCD verde.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/lcd-theme.css?v=3.0">
    <link rel="stylesheet" href="./styles/main.css?v=3.0">
    <link rel="stylesheet" href="./styles/responsive.css?v=3.0">
    <title>Finanzas LCD</title>
  </head>
  <body>
    <div class="device-shell">
      <div class="device-brand" aria-hidden="true">
        <strong>PirePilot</strong>
        <span>FINANZAS LCD</span>
      </div>

      <header class="status-bar" aria-live="polite">
        <div class="status-main">
          <strong id="section-title">RESUMEN</strong>
          <span id="status-date">-- ---</span>
        </div>
        <div class="weekday-strip" aria-hidden="true">
          <span>L</span>
          <span>M</span>
          <span>X</span>
          <span>J</span>
          <span>V</span>
        </div>
        <div class="status-tools">
          <button class="version-key" id="update-app-button" type="button" aria-label="Actualizar app">v3.0</button>
          <div class="sync-indicator" id="sync-status">
            <span class="sync-dot" aria-hidden="true"></span>
            <span>Sin iniciar</span>
          </div>
        </div>
      </header>

      <main class="lcd-screen" id="app-screen" tabindex="-1">
        <section class="system-window">
          <div class="window-title">CARGANDO</div>
          <p class="lcd-muted">Preparando la agenda financiera...</p>
        </section>
      </main>

      <section class="key-zone" aria-label="Acciones principales">
        <div class="graffiti-zone">
          <button class="action-key" id="action-key" type="button">
            <span class="action-key-label">NEW</span>
          </button>
          <div class="stylus-pad" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
        </div>

        <nav class="bottom-nav" aria-label="Secciones">
          <button class="nav-key is-active" data-view="resumen" type="button">
            <span class="pixel-icon icon-summary" aria-hidden="true"></span>
            <span>Home</span>
          </button>
          <button class="nav-key" data-view="gastos" type="button">
            <span class="pixel-icon icon-list" aria-hidden="true"></span>
            <span>Gastos</span>
          </button>
          <button class="nav-key" data-view="metas" type="button">
            <span class="pixel-icon icon-goal" aria-hidden="true"></span>
            <span>Metas</span>
          </button>
          <button class="nav-key" data-view="configuracion" type="button">
            <span class="pixel-icon icon-config" aria-hidden="true"></span>
            <span>Prefs</span>
          </button>
        </nav>
      </section>
    </div>

    <div id="modal-root" class="modal-root" hidden></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="./scripts/config.js?v=3.0"></script>
    <script src="./scripts/utils.js?v=3.0"></script>
    <script src="./scripts/state.js?v=3.0"></script>
    <script src="./scripts/api.js?v=3.0"></script>
    <script src="./scripts/local-cache.js?v=3.0"></script>
    <script src="./scripts/router.js?v=3.0"></script>
    <script src="./scripts/lcd-image.js?v=3.0"></script>
    <script src="./scripts/forms.js?v=3.0"></script>
    <script src="./scripts/render.js?v=3.0"></script>
    <script src="./scripts/app.js?v=3.0"></script>
  </body>
</html>
