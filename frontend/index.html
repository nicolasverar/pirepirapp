<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1e2a1e">
    <meta name="description" content="Finanzas personales con estetica LCD verde.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/lcd-theme.css">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <title>Finanzas LCD</title>
  </head>
  <body>
    <div class="device-shell">
      <header class="status-bar" aria-live="polite">
        <div>
          <strong id="section-title">RESUMEN</strong>
          <span id="status-date">-- ---</span>
        </div>
        <div class="sync-indicator" id="sync-status">
          <span class="sync-dot" aria-hidden="true"></span>
          <span>Sin iniciar</span>
        </div>
      </header>

      <main class="lcd-screen" id="app-screen" tabindex="-1">
        <section class="system-window">
          <div class="window-title">CARGANDO</div>
          <p class="lcd-muted">Preparando la agenda financiera...</p>
        </section>
      </main>

      <section class="key-zone" aria-label="Acciones principales">
        <button class="action-key" id="action-key" type="button">
          <span class="action-key-label">AGREGAR</span>
        </button>

        <nav class="bottom-nav" aria-label="Secciones">
          <button class="nav-key is-active" data-view="resumen" type="button">
            <span class="pixel-icon icon-summary" aria-hidden="true"></span>
            <span>Resumen</span>
          </button>
          <button class="nav-key" data-view="gastos" type="button">
            <span class="pixel-icon icon-list" aria-hidden="true"></span>
            <span>Gastos</span>
          </button>
          <button class="nav-key" data-view="metas" type="button">
            <span class="pixel-icon icon-goal" aria-hidden="true"></span>
            <span>Metas</span>
          </button>
          <button class="nav-key" data-view="configuracion" type="button">
            <span class="pixel-icon icon-config" aria-hidden="true"></span>
            <span>Config</span>
          </button>
        </nav>
      </section>
    </div>

    <div id="modal-root" class="modal-root" hidden></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="./scripts/config.js"></script>
    <script src="./scripts/utils.js"></script>
    <script src="./scripts/state.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/router.js"></script>
    <script src="./scripts/lcd-image.js"></script>
    <script src="./scripts/forms.js"></script>
    <script src="./scripts/render.js"></script>
    <script src="./scripts/app.js"></script>
  </body>
</html>
