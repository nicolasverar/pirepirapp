<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1e2a1e">
    <meta name="description" content="Finanzas personales con estetica LCD verde.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.png" type="image/png">
    <link rel="stylesheet" href="./styles/lcd-theme.css?v=2.86">
    <link rel="stylesheet" href="./styles/main.css?v=2.86">
    <link rel="stylesheet" href="./styles/responsive.css?v=2.86">
    <title>Pirepirapp</title>
  </head>
  <body>
    <div class="device-shell">
      <header class="status-bar" aria-live="polite">
        <div class="brand-mark" aria-label="Pirepirapp">
          <strong>PIREPIRAPP</strong>
          <button class="version-key brand-version" id="update-app-button" type="button" aria-label="Actualizar app">v2.86</button>
        </div>
        <div class="status-terminal" id="status-terminal" aria-live="polite" aria-label="Estado de la app">
          <span>Sin iniciar</span>
        </div>
        <div class="status-tools">
          <div class="sync-indicator" id="sync-status" aria-label="Conexion">
            <span class="sync-dot" aria-hidden="true"></span>
            <span class="sync-label">Sin iniciar</span>
          </div>
        </div>
      </header>

      <main class="lcd-screen" id="app-screen" tabindex="-1">
        <section class="system-window">
          <div class="window-title">CARGANDO</div>
          <p class="lcd-muted">Preparando la agenda financiera...</p>
        </section>
      </main>

      <section class="key-zone" aria-label="Acciones principales">
        <button class="action-key" id="action-key" type="button">
          <span class="action-key-label">AGREGAR</span>
        </button>

        <nav class="bottom-nav" aria-label="Secciones">
          <button class="nav-key is-active" data-view="resumen" type="button">
            <span class="nav-icon nav-icon-summary" aria-hidden="true"></span>
            <span>Resumen</span>
          </button>
          <button class="nav-key" data-view="gastos" type="button">
            <span class="nav-icon nav-icon-expenses" aria-hidden="true"></span>
            <span>Gastos</span>
          </button>
          <button class="nav-key" data-view="metas" type="button">
            <span class="nav-icon nav-icon-goals" aria-hidden="true"></span>
            <span>Metas</span>
          </button>
          <button class="nav-key" data-view="configuracion" type="button">
            <span class="nav-icon nav-icon-config" aria-hidden="true"></span>
            <span>Config</span>
          </button>
        </nav>
      </section>
    </div>

    <div id="modal-root" class="modal-root" hidden></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="./scripts/config.js?v=2.86"></script>
    <script src="./scripts/utils.js?v=2.86"></script>
    <script src="./scripts/state.js?v=2.86"></script>
    <script src="./scripts/local-store.js?v=2.86"></script>
    <script src="./scripts/api.js?v=2.86"></script>
    <script src="./scripts/local-cache.js?v=2.86"></script>
    <script src="./scripts/router.js?v=2.86"></script>
    <script src="./scripts/lcd-image.js?v=2.86"></script>
    <script src="./scripts/forms.js?v=2.86"></script>
    <script src="./scripts/render.js?v=2.86"></script>
    <script src="./scripts/app.js?v=2.86"></script>
  </body>
</html>
