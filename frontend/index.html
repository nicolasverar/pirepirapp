<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1e2a1e">
    <meta name="description" content="Finanzas personales con estetica LCD verde.">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/lcd-theme.css?v=2.6">
    <link rel="stylesheet" href="./styles/main.css?v=2.6">
    <link rel="stylesheet" href="./styles/responsive.css?v=2.6">
    <title>Pirepirapp</title>
  </head>
  <body>
    <div class="device-shell">
      <header class="status-bar" aria-live="polite">
        <div class="brand-mark" aria-label="Pirepirapp">
          <span class="brand-pixel" aria-hidden="true">
            <i></i><i></i><i></i><i></i>
          </span>
          <strong>PIREPIRAPP</strong>
        </div>
        <div class="status-tools">
          <button class="version-key" id="update-app-button" type="button" aria-label="Actualizar app">v2.6</button>
          <div class="sync-indicator" id="sync-status">
            <span class="sync-dot" aria-hidden="true"></span>
            <span>Sin iniciar</span>
          </div>
        </div>
      </header>

      <main class="lcd-screen" id="app-screen" tabindex="-1">
        <section class="system-window">
          <div class="window-title">CARGANDO</div>
          <p class="lcd-muted">Preparando la agenda financiera...</p>
        </section>
      </main>

      <section class="key-zone" aria-label="Acciones principales">
        <button class="action-key" id="action-key" type="button">
          <span class="action-key-label">AGREGAR</span>
        </button>

        <nav class="bottom-nav" aria-label="Secciones">
          <button class="nav-key is-active" data-view="resumen" type="button">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 10h4V5h8v5h4v9h-5v-5h-6v5H4z"></path>
              <path d="M9 9h6M7 13h2M15 13h2"></path>
            </svg>
            <span>Resumen</span>
          </button>
          <button class="nav-key" data-view="gastos" type="button">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6 3h11l2 2v16H6z"></path>
              <path d="M9 8h7M9 12h7M9 16h5M5 7h3M5 11h3M5 15h3"></path>
            </svg>
            <span>Gastos</span>
          </button>
          <button class="nav-key" data-view="metas" type="button">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 20V4h12l-2 4 2 4H5"></path>
              <path d="M9 16h7M9 12h4"></path>
            </svg>
            <span>Metas</span>
          </button>
          <button class="nav-key" data-view="configuracion" type="button">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7 3h10v18H7z"></path>
              <path d="M10 7h4M10 11h4M10 15h1M14 15h1M10 18h5"></path>
            </svg>
            <span>Config</span>
          </button>
        </nav>
      </section>
    </div>

    <div id="modal-root" class="modal-root" hidden></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="./scripts/config.js?v=2.6"></script>
    <script src="./scripts/utils.js?v=2.6"></script>
    <script src="./scripts/state.js?v=2.6"></script>
    <script src="./scripts/api.js?v=2.6"></script>
    <script src="./scripts/local-cache.js?v=2.6"></script>
    <script src="./scripts/router.js?v=2.6"></script>
    <script src="./scripts/lcd-image.js?v=2.6"></script>
    <script src="./scripts/forms.js?v=2.6"></script>
    <script src="./scripts/render.js?v=2.6"></script>
    <script src="./scripts/app.js?v=2.6"></script>
  </body>
</html>
